{% extends 'base.html' %}
{% block content %}
<div class="glass-card p-4 p-sm-5 mx-auto" style="max-width: 550px;">
    <div class="text-center mb-4">
        <i class="bi bi-shield-check text-gradient display-5 mb-2 d-inline-block"></i>
        <h4 class="text-white font-tech fw-bold m-0">User Node Parameters</h4>
        <p class="text-muted small">Crypto identity environment variables mapping configurations</p>
    </div>
    <hr class="border-secondary opacity-25 mb-4">
    <div class="mb-3">
        <label class="form-label text-white-50 font-tech small">REGISTERED IDENTITY HANDLER</label>
        <input type="text" class="form-control bg-dark text-white-50 border-secondary p-3 rounded-3" style="--bs-border-opacity: 0.1" value="{{ session['username'] }}" disabled>
    </div>
    <div class="mb-4">
        <label class="form-label text-white-50 font-tech small">ACCOUNT ROUTING EMAIL LINK</label>
        <input type="text" class="form-control bg-dark text-white-50 border-secondary p-3 rounded-3" style="--bs-border-opacity: 0.1" value="{{ session['email'] }}" disabled>
    </div>
    <div class="alert alert-dark border-secondary text-white-50 text-center py-3 m-0 small font-monospace rounded-3" style="background: rgba(0,0,0,0.25)">
        SYSTEM ASSIGNED PRIVILEGES: [ STANDARD_DEV_ACCESS_NODES ]
    </div>
</div>
{% endblock %}
